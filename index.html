    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/rust.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/dockerfile.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/nginx.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --primary-dark: #5568d3;
            --secondary-color: #764ba2;
            --bg-color: #f5f7fa;
            --sidebar-bg: #ffffff;
            --text-color: #333;
            --text-light: #666;
            --border-color: #e0e0e0;
            --hover-bg: #f0f2f5;
            --active-bg: #e8f0fe;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--bg-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 15px 20px;
            box-shadow: var(--shadow);
            flex-shrink: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
        }

        header h1 {
            font-size: 1.5em;
            font-weight: 600;
        }

        header p {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .menu-toggle {
            display: none;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 50;
        }

        .sidebar-header {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .search-box {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-box:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .folder-item {
            margin-bottom: 5px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .folder-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 10px 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            transition: filter 0.3s;
        }

        .folder-header:hover {
            filter: brightness(1.1);
        }

        .folder-icon {
            margin-right: 8px;
        }

        .folder-arrow {
            transition: transform 0.3s;
        }

        .folder-arrow.open {
            transform: rotate(90deg);
        }

        .folder-content {
            background: #fafbfc;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .folder-content.open {
            max-height: 5000px;
        }

        .subfolder-item {
            border-top: 1px solid var(--border-color);
        }

        .subfolder-header {
            background: #f0f2f5;
            padding: 8px 12px 8px 24px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-color);
            transition: background 0.3s;
        }

        .subfolder-header:hover {
            background: #e8eaed;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px 8px 36px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-light);
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .file-item:hover {
            background: var(--hover-bg);
            color: var(--text-color);
            border-left-color: var(--primary-color);
        }

        .file-item.active {
            background: var(--active-bg);
            color: var(--primary-color);
            border-left-color: var(--primary-color);
        }

        .file-icon {
            margin-right: 8px;
            font-size: 14px;
        }

        .file-icon.md {
            color: #083fa1;
        }

        .file-icon.ppt {
            color: #d24726;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--sidebar-bg);
        }

        .content-header {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .content-title {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--text-color);
        }

        .breadcrumb {
            font-size: 12px;
            color: var(--text-light);
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .markdown-body {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .markdown-body h1 {
            font-size: 2em;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .markdown-body h2 {
            font-size: 1.5em;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .markdown-body h3 {
            font-size: 1.25em;
            margin-top: 25px;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .markdown-body p {
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .markdown-body code {
            background: #f6f8fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }

        .markdown-body pre {
            background: #1e1e1e;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: #d4d4d4;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 16px;
            margin: 15px 0;
            color: var(--text-light);
            background: #f8f9fa;
            padding: 10px 16px;
            border-radius: 0 8px 8px 0;
        }

        .markdown-body ul, .markdown-body ol {
            margin: 15px 0;
            padding-left: 24px;
        }

        .markdown-body li {
            margin-bottom: 8px;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            text-align: left;
        }

        .markdown-body th {
            background: #f6f8fa;
            font-weight: 600;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }

        .ppt-container {
            width: 100%;
            height: 100%;
            min-height: 500px;
        }

        .ppt-container iframe {
            width: 100%;
            height: 80vh;
            border: none;
            border-radius: 8px;
        }

        .ppt-preview {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .ppt-preview h2 {
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .ppt-preview .ppt-icon-large {
            font-size: 80px;
            color: #d24726;
            margin-bottom: 20px;
        }

        .ppt-preview .open-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .ppt-preview .open-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .welcome-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-page h2 {
            font-size: 2em;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .welcome-page p {
            color: var(--text-light);
            font-size: 1.1em;
            max-width: 500px;
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
        }

        .overlay.show {
            display: block;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                width: 300px;
                max-width: 85vw;
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .content-body {
                padding: 15px;
            }

            .markdown-body {
                padding: 20px;
            }

            header h1 {
                font-size: 1.2em;
            }

            .content-header {
                padding: 10px 15px;
            }

            .content-title {
                font-size: 1em;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 280px;
            }

            .markdown-body {
                padding: 15px;
            }

            .markdown-body h1 {
                font-size: 1.5em;
            }

            .markdown-body h2 {
                font-size: 1.25em;
            }

            .markdown-body h3 {
                font-size: 1.1em;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>

    <header>
        <div class="header-content">
            <div>
                <h1>知识库文档浏览器</h1>
                <p>支持 Markdown 和 PPT 文件在线预览</p>
            </div>
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        </div>
    </header>

    <div class="main-container">
        <div class="overlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <input type="text" class="search-box" placeholder="搜索文件..." oninput="filterFiles(this.value)">
            </div>
            <div class="file-list" id="fileList"></div>
        </aside>
        <main class="content-area">
            <div class="content-header">
                <div class="content-title" id="contentTitle">欢迎</div>
                <div class="breadcrumb" id="breadcrumb"></div>
            </div>
            <div class="content-body" id="contentBody">

                    <p>从左侧菜单选择文件开始阅读，支持 Markdown 和 PPT 文件在线预览</p>
                </div>
            </div>
        </main>
    </div>

        let currentFile = null;

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (ext === 'md') return '<span class="file-icon md">📝</span>';
            if (['ppt', 'pptx'].includes(ext)) return '<span class="file-icon ppt">📊</span>';
            return '<span class="file-icon">📄</span>';
        }

        function renderFileList() {
            const container = document.getElementById('fileList');
            let html = '';

            for (const [folderName, content] of Object.entries(fileStructure)) {
                html += `<div class="folder-item">
                    <div class="folder-header" onclick="toggleFolder(this)">
                        <span><span class="folder-icon">📁</span>${folderName}</span>
                        <span class="folder-arrow">▶</span>
                    </div>
                    <div class="folder-content">`;

                if (Array.isArray(content)) {
                    content.forEach(file => {
                        const path = `${folderName}/${file}`;
                        html += `<div class="file-item" onclick="loadFile('${path}', '${file}')" data-name="${file.toLowerCase()}">
                            ${getFileIcon(file)}${file}
                        </div>`;
                    });
                } else {
                    if (content._files) {
                        content._files.forEach(file => {
                            const path = `${folderName}/${file}`;
                            html += `<div class="file-item" onclick="loadFile('${path}', '${file}')" data-name="${file.toLowerCase()}">
                                ${getFileIcon(file)}${file}
                            </div>`;
                        });
                    }
                    for (const [subFolderName, files] of Object.entries(content)) {
                        if (subFolderName === '_files') continue;
                        
                        if (Array.isArray(files)) {
                            html += `<div class="subfolder-item">
                                <div class="subfolder-header" onclick="toggleSubfolder(this)">
                                    <span><span class="folder-icon">📂</span>${subFolderName}</span>
                                    <span class="folder-arrow">▶</span>
                                </div>
                                <div class="folder-content">`;
                            files.forEach(file => {
                                const path = `${folderName}/${subFolderName}/${file}`;
                                html += `<div class="file-item" onclick="loadFile('${path}', '${file}')" data-name="${file.toLowerCase()}">
                                    ${getFileIcon(file)}${file}
                                </div>`;
                            });
                            html += `</div></div>`;
                        } else {
                            html += `<div class="subfolder-item">
                                <div class="subfolder-header" onclick="toggleSubfolder(this)">
                                    <span><span class="folder-icon">📂</span>${subFolderName}</span>
                                    <span class="folder-arrow">▶</span>
                                </div>
                                <div class="folder-content">`;
                            
                            if (files._files) {
                                files._files.forEach(file => {
                                    const path = `${folderName}/${subFolderName}/${file}`;
                                    html += `<div class="file-item" onclick="loadFile('${path}', '${file}')" data-name="${file.toLowerCase()}">
                                        ${getFileIcon(file)}${file}
                                    </div>`;
                                });
                            }
                            
                            for (const [subSubFolderName, subFiles] of Object.entries(files)) {
                                if (subSubFolderName === '_files') continue;
                                html += `<div class="subfolder-item">
                                    <div class="subfolder-header" onclick="toggleSubfolder(this)">
                                        <span><span class="folder-icon">📂</span>${subSubFolderName}</span>
                                        <span class="folder-arrow">▶</span>
                                    </div>
                                    <div class="folder-content">`;
                                subFiles.forEach(file => {
                                    const path = `${folderName}/${subFolderName}/${subSubFolderName}/${file}`;
                                    html += `<div class="file-item" onclick="loadFile('${path}', '${file}')" data-name="${file.toLowerCase()}">
                                        ${getFileIcon(file)}${file}
                                    </div>`;
                                });
                                html += `</div></div>`;
                            }
                            html += `</div></div>`;
                        }
                    }
                }
                html += '</div></div>';
            }

            container.innerHTML = html;
        }

        function toggleFolder(element) {
            const content = element.nextElementSibling;
            const arrow = element.querySelector('.folder-arrow');
            content.classList.toggle('open');
            arrow.classList.toggle('open');
        }

        function toggleSubfolder(element) {
            const content = element.nextElementSibling;
            const arrow = element.querySelector('.folder-arrow');
            content.classList.toggle('open');
            arrow.classList.toggle('open');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.overlay');
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        function filterFiles(query) {
            const files = document.querySelectorAll('.file-item');
            const folders = document.querySelectorAll('.folder-item');
            
            query = query.toLowerCase().trim();
            
            if (!query) {
                files.forEach(f => f.style.display = 'flex');
                return;
            }

            files.forEach(file => {
                const name = file.getAttribute('data-name') || '';
                file.style.display = name.includes(query) ? 'flex' : 'none';
            });

            folders.forEach(folder => {
                const visibleFiles = folder.querySelectorAll('.file-item[style*="flex"]');
                if (visibleFiles.length > 0) {
                    folder.style.display = 'block';
                    const folderContent = folder.querySelector('.folder-content');
                    if (folderContent) folderContent.classList.add('open');
                } else {
                    folder.style.display = 'none';
                }
            });
        }

        async function loadFile(path, filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const contentBody = document.getElementById('contentBody');
            const contentTitle = document.getElementById('contentTitle');
            const breadcrumb = document.getElementById('breadcrumb');

            document.querySelectorAll('.file-item').forEach(f => f.classList.remove('active'));
            event.target.closest('.file-item')?.classList.add('active');

            contentTitle.textContent = filename;
            breadcrumb.textContent = path;

            if (window.innerWidth <= 768) {
                toggleSidebar();
            }

            if (ext === 'md') {
                try {
                    const response = await fetch(path);
                    if (!response.ok) throw new Error('文件加载失败');
                    const text = await response.text();
                    const html = marked.parse(text);
                    contentBody.innerHTML = `<div class="markdown-body">${html}</div>`;
                    if (typeof hljs !== 'undefined') {
                        document.querySelectorAll('.markdown-body pre code').forEach(block => {
                            hljs.highlightElement(block);
                        });
                    }
                } catch (error) {
                    contentBody.innerHTML = `<div class="markdown-body">
                        <h2>文件加载失败</h2>
                        <p>无法加载文件: ${path}</p>
                        <p>错误信息: ${error.message}</p>
                        <p>请确保文件存在且可以通过HTTP服务器访问。</p>
                    </div>`;
                }
            } else if (['ppt', 'pptx'].includes(ext)) {
                const encodedPath = encodeURIComponent(path);
                contentBody.innerHTML = `<div class="ppt-preview">
                    <div class="ppt-icon-large">📊</div>
                    <h2>${filename}</h2>
                    <p style="margin-bottom: 20px; color: #666;">PPT文件预览</p>
                    <a href="${path}" class="open-btn" target="_blank">下载查看</a>
                </div>`;
            } else {
                contentBody.innerHTML = `<div class="markdown-body">
                    <h2>不支持的文件类型</h2>
                    <p>暂不支持预览此类型文件: ${ext}</p>
                </div>`;
            }
        }

        marked.setOptions({
            breaks: true,
            gfm: true
        });

        renderFileList();
    </script>
